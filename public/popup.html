          <div class="error-title">__MSG_error_title__</div>
          <p class="error-message">エラーが表示</p>

          <h2 class="events-title">__MSG_all_day_schedule__</h2>
          <ul class="events-list allday-events-list"></ul>
        </section>
        <section class="events-container">
          <h2 class="events-title">__MSG_today_schedule__</h2>
          <ul class="events-list"></ul>
          <p class="no-events" hidden>__MSG_no_events_today__</p>
        </section>
      </main>
    </div>
  </body>
</html>
